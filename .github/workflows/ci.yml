name: CI

on:
  push:
    branches: ["main", "develop", "feat/**", "fix/**", "chore/**", "refactor/**", "ci/**", "build/**"]
  pull_request:
    branches: ["develop", "main"]

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y sbcl groff bats gpg

      - name: Install Quicklisp + FiveAM
        run: |
          curl -sO https://beta.quicklisp.org/quicklisp.lisp
          sbcl --non-interactive \
               --load quicklisp.lisp \
               --eval '(quicklisp-quickstart:install :path (merge-pathnames "quicklisp/" (user-homedir-pathname)))' \
               --eval '(ql:quickload :fiveam :silent t)'

      - name: Build mlisp
        run: sbcl --non-interactive --load build.lisp

      - name: Build mlisp-admin
        run: sbcl --non-interactive --load build-admin.lisp

      - name: Build mlisp-distrib
        run: sbcl --non-interactive --load build-distrib.lisp

      - name: Verify binaries exist and run
        run: |
          test -x bin/mlisp
          test -x bin/mlisp-admin
          test -x bin/mlisp-distrib
          bin/mlisp --help
          bin/mlisp-admin --help
          bin/mlisp-distrib --help

      - name: FiveAM unit tests — mlisp
        run: |
          sbcl --non-interactive \
               --load build.lisp 2>/dev/null || true
          sbcl --non-interactive \
               --eval "(load (merge-pathnames \"quicklisp/setup.lisp\" (user-homedir-pathname)))" \
               --eval "(ql:quickload :fiveam :silent t)" \
               --eval "(push (truename \".\") asdf:*central-registry*)" \
               --load test/fiveam/test-mlisp.lisp

      - name: FiveAM unit tests — MIME
        run: |
          sbcl --non-interactive \
               --eval "(load (merge-pathnames \"quicklisp/setup.lisp\" (user-homedir-pathname)))" \
               --eval "(ql:quickload :fiveam :silent t)" \
               --eval "(push (truename \".\") asdf:*central-registry*)" \
               --load test/fiveam/test-mlisp-mime.lisp

      - name: BATS integration tests
        run: MLISP_HOME="$(pwd)" bats --tap test/bats/test_mlisp.bats

      - name: BATS regression tests
        run: MLISP_HOME="$(pwd)" bats --tap test/bats/test_mlisp_regression.bats

      - name: BATS compliance tests
        run: MLISP_HOME="$(pwd)" bats --tap test/bats/test_mlisp_compliance.bats

      - name: BATS config/admin tests
        run: MLISP_HOME="$(pwd)" bats --tap test/bats/test_mlisp_config.bats

      - name: BATS procmail tests
        run: MLISP_HOME="$(pwd)" bats --tap test/bats/test_mlisp_procmail.bats

      - name: BATS MIME tests
        run: MLISP_HOME="$(pwd)" bats --tap test/bats/test_mlisp_mime.bats

      - name: BATS feature tests
        run: MLISP_HOME="$(pwd)" bats --tap test/bats/test_mlisp_features.bats

      - name: BATS batch2 tests
        run: MLISP_HOME="$(pwd)" bats --tap test/bats/test_mlisp_batch2.bats

      - name: BATS GPG/hash tests
        run: MLISP_HOME="$(pwd)" bats --tap test/bats/test_mlisp_gpg.bats

      - name: Build mlisp-bugs
        run: sbcl --non-interactive --load build-bugs.lisp

      - name: Build mlisp-procmail-gen
        run: sbcl --non-interactive --load build-procmail-gen.lisp

      - name: Verify mlisp-bugs and mlisp-procmail-gen binaries
        run: |
          test -x bin/mlisp-bugs
          test -x bin/mlisp-procmail-gen
          bin/mlisp-procmail-gen --help

      # The following suites existed but were not previously wired into CI
      # (gap predates this change; closing it here since it directly affects
      # mlisp-bugs and mlisp-procmail-gen, both built above).
      - name: BATS v0.4/v0.5/v0.6/filters/bugs/procmail-gen suites
        run: |
          for s in test_mlisp_v04a test_mlisp_v04b test_mlisp_v04cd \
                   test_mlisp_v05 test_mlisp_v06 test_mlisp_filters \
                   test_mlisp_bugs test_mlisp_procmail_gen; do
            echo "=== $s ==="
            MLISP_HOME="$(pwd)" bats --tap "test/bats/${s}.bats"
          done

  notify-failure:
    name: Notify on failure
    needs: build-and-test
    if: failure() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Open failure issue
        uses: jayqi/failed-build-issue-action@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          label-name: ci-failure
