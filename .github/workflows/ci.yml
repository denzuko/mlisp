name: CI

on:
  push:
    branches: ["main", "develop", "feat/**", "fix/**", "chore/**", "refactor/**", "ci/**", "build/**"]
  pull_request:
    branches: ["develop", "main"]

jobs:
  # ── Primary: FiveAM unit/BDD tests via 40ants toolchain ──────────────────
  #
  # FiveAM (mlisp-suite + mime-suite, 78 specs) is the source-of-truth for
  # behavioral correctness of src/*.lisp. Runs first; BATS integration
  # tests only run once these pass.
  unit-tests:
    name: FiveAM unit tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        lisp: [sbcl-bin]

    env:
      LISP: ${{ matrix.lisp }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Common Lisp (Roswell + Qlot)
        uses: 40ants/setup-lisp@v4
        with:
          asdf-system: mlisp
          qlfile-template: |
            ql fiveam
            ql 40ants-doc

      - name: Run FiveAM unit tests (mlisp-suite + mime-suite, 78 specs)
        uses: 40ants/run-tests@v2
        with:
          asdf-system: mlisp
          run-tests: |
            (asdf:test-system :mlisp)

  # ── Secondary: BATS integration tests (compiled binaries, end-to-end) ───
  #
  # Integration tests exercise the compiled binaries via subprocess.
  # Depend on unit-tests passing first (fail fast on logic errors
  # before spending time on binary builds + 2 VM jobs in release.yml).
  integration-tests:
    name: BATS integration tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y sbcl groff bats gpg m4 curl jq

      - name: Install Quicklisp
        run: |
          curl -sO https://beta.quicklisp.org/quicklisp.lisp
          sbcl --non-interactive \
               --load quicklisp.lisp \
               --eval '(quicklisp-quickstart:install :path (merge-pathnames "quicklisp/" (user-homedir-pathname)))' \
               --eval '(ql:quickload :fiveam :silent t)'

      - name: Build all binaries (including neural)
        run: make build-all

      - name: Verify binaries
        run: |
          for b in bin/mlisp bin/mlisp-admin bin/mlisp-bugs bin/mlisp-distrib bin/mlisp-procmail-gen bin/neural; do
            test -x "$b" || (echo "Missing: $b" && exit 1)
          done
          bin/mlisp --help
          bin/mlisp-admin --help
          bin/mlisp-procmail-gen --help

      - name: BATS integration tests (all suites)
        run: |
          for f in $(find test/bats -name '*.bats' | sort); do
            echo "=== $f ==="
            MLISP_HOME="$(pwd)" bats --tap "$f"
          done

  # ── Documentation (40ANTS-DOC-FULL via 40ants/build-docs) ────────────────
  #
  # Builds HTML docs from docstrings/40ants-doc page definitions and
  # pushes any changes to gh-pages. Runs only on develop/main (not every
  # PR) since it can push commits.
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Common Lisp (Roswell + Qlot)
        uses: 40ants/setup-lisp@v4
        with:
          asdf-system: mlisp
          qlfile-template: |
            ql fiveam
            ql 40ants-doc

      - name: Build and publish documentation
        uses: 40ants/build-docs@v1
        with:
          asdf-system: mlisp

  notify-failure:
    name: Notify on failure
    needs: [unit-tests, integration-tests]
    if: failure() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Open failure issue
        uses: jayqi/failed-build-issue-action@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          label-name: ci-failure
