name: Release

# Triggered on version tags (v0.1.0, v0.7.0, ...). Creates the GitHub
# Release for the tag (if it doesn't already exist) via `gh release
# create --generate-notes`, then builds and attaches platform artifacts.
# Fully automated end-to-end as of create-release below -- previously
# `gh release upload` (used by the per-platform jobs) required the
# release to already exist, which was only true because v0.1.0-v0.7.0
# were created manually during the #97 backfill. Any *new* tag push
# would have failed at the upload step with no release to attach to.
#
# Status (see #97 for design discussion):
#   create-release: WORKING. `gh release view <tag> || gh release create
#                   <tag> --generate-notes`. Tag-push only (skipped on
#                   workflow_dispatch from a branch, where there's no
#                   tag to create a release for).
#   linux-tarball : working. Builds all 5 binaries via the existing
#                   build*.lisp scripts and packages a generic
#                   linux-x86_64 tarball with manpages + LICENSE.
#   linux-pkgsrc  : WORKING (confirmed 2026-06-12, two consecutive green
#                   dispatches). Builds the binaries, bootstraps pkgsrc
#                   from source (~2.5min), then runs `pkg_create` using
#                   the etc/pkg/ templates (Makefile, PLIST, DESCR),
#                   producing mlisp-<ver>-linux-x86_64.tgz (~54MB).
#   netbsd-pkgsrc : NEW, UNVERIFIED. vmactions/netbsd-vm, installs sbcl
#                   via PKG_PATH (cdn.NetBSD.org binary packages, no
#                   pkgsrc bootstrap needed -- only consuming a binary
#                   pkg, unlike linux-pkgsrc which builds one), builds
#                   all 5 binaries, then pkg_create using the same
#                   etc/pkg/ templates as linux-pkgsrc -- producing
#                   mlisp-<ver>-netbsd-x86_64.tgz. Needs confirmation
#                   that vmactions (nested virt) works on this runner.
#   freebsd-pkg   : NEW, UNVERIFIED. vmactions/freebsd-vm, `pkg install
#                   sbcl` (FreeBSD's binary pkg repo, no ports tree
#                   needed), builds all 5 binaries, stages a root/ and
#                   uses `pkg create -M +MANIFEST -r root` (FreeBSD's
#                   native binary-package builder -- no ports-tree
#                   checkout, no `make makesum`, no GH-release-tag
#                   dependency) -- producing mlisp-<ver>-freebsd-x86_64.pkg.
#                   etc/freebsd-port/ (ports-tree skeleton, from #102)
#                   remains for a possible future actual ports-tree
#                   submission, separate from this CI-produced .pkg.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  create-release:
    name: Create GitHub Release (if needed)
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Create release if it doesn't exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists; leaving notes as-is."
          else
            gh release create "$tag" --title "$tag" --generate-notes
          fi

  linux-tarball:
    name: Linux binary tarball
    runs-on: ubuntu-latest
    needs: create-release
    if: always() && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped')
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: ver
        run: |
          ref="${GITHUB_REF#refs/tags/v}"
          if [ "$ref" = "$GITHUB_REF" ]; then ref="0.0.0-dev"; fi
          echo "version=$ref" >> "$GITHUB_OUTPUT"

      - name: Install SBCL + Quicklisp
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y sbcl
          curl -sO https://beta.quicklisp.org/quicklisp.lisp
          sbcl --non-interactive \
               --load quicklisp.lisp \
               --eval '(quicklisp-quickstart:install :path (merge-pathnames "quicklisp/" (user-homedir-pathname)))'

      - name: Build all binaries
        run: |
          sbcl --non-interactive --load build.lisp
          sbcl --non-interactive --load build-admin.lisp
          sbcl --non-interactive --load build-bugs.lisp
          sbcl --non-interactive --load build-distrib.lisp
          sbcl --non-interactive --load build-procmail-gen.lisp

      - name: Stage and package tarball
        run: |
          v="${{ steps.ver.outputs.version }}"
          name="mlisp-${v}"
          stage="$(mktemp -d)/${name}"
          mkdir -p "$stage/bin" "$stage/man/man1" "$stage/man/man7"
          cp bin/mlisp bin/mlisp-admin bin/mlisp-bugs bin/mlisp-distrib bin/mlisp-procmail-gen "$stage/bin/"
          cp src/man/mlisp.1 src/man/mlisp-admin.1 src/man/mlisp-distrib.1 "$stage/man/man1/"
          cp src/man/mlisp-intro.7 "$stage/man/man7/"
          cp LICENSE* "$stage/" 2>/dev/null || true
          tar -C "$(dirname "$stage")" -czf "${name}-linux-x86_64.tar.gz" "${name}"
          echo "ARTIFACT=${name}-linux-x86_64.tar.gz" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64-tarball
          path: ${{ env.ARTIFACT }}

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF#refs/tags/}" "${{ env.ARTIFACT }}" --clobber

  linux-pkgsrc:
    name: Linux pkgsrc package
    runs-on: ubuntu-latest
    needs: linux-tarball
    if: always() && (needs.linux-tarball.result == 'success')
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: ver
        run: |
          ref="${GITHUB_REF#refs/tags/v}"
          if [ "$ref" = "$GITHUB_REF" ]; then ref="0.0.0-dev"; fi
          echo "version=$ref" >> "$GITHUB_OUTPUT"

      - name: Download linux tarball artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-x86_64-tarball

      - name: Bootstrap pkgsrc
        run: |
          set -x
          curl -L -o pkgsrc.tar.gz \
            https://cdn.NetBSD.org/pub/pkgsrc/current/pkgsrc.tar.gz
          tar xzf pkgsrc.tar.gz
          cd pkgsrc/bootstrap
          ./bootstrap --unprivileged --prefix "$HOME/pkg"

      - name: pkg_create using etc/pkg/ templates
        run: |
          set -x
          export PATH="$HOME/pkg/bin:$HOME/pkg/sbin:$PATH"
          v="${{ steps.ver.outputs.version }}"
          name="mlisp-${v}"
          tar xzf "${name}-linux-x86_64.tar.gz"
          work="$(mktemp -d)/work"
          mkdir -p "$work"
          cp -r "${name}/." "$work/"
          sed "s/@PKGVERSION@/${v}/" etc/pkg/Makefile > "$work/Makefile"
          cp etc/pkg/PLIST etc/pkg/DESCR "$work/"
          pkg_create -c etc/pkg/DESCR -d etc/pkg/DESCR \
            -f etc/pkg/PLIST -I /usr/pkg -p "$work" \
            -U "${name}-linux-x86_64.tgz"
          echo "ARTIFACT=${name}-linux-x86_64.tgz" >> "$GITHUB_ENV"

      - name: Upload pkgsrc artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64-pkgsrc
          path: ${{ env.ARTIFACT }}

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF#refs/tags/}" "${{ env.ARTIFACT }}" --clobber

  netbsd-pkgsrc:
    name: NetBSD pkgsrc package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: ver
        run: |
          ref="${GITHUB_REF#refs/tags/v}"
          if [ "$ref" = "$GITHUB_REF" ]; then ref="0.0.0-dev"; fi
          echo "version=$ref" >> "$GITHUB_OUTPUT"

      - name: Build in NetBSD VM and pkg_create
        uses: vmactions/netbsd-vm@v1
        with:
          envs: "VER"
          prepare: |
            export PKG_PATH="https://cdn.NetBSD.org/pub/pkgsrc/packages/NetBSD/$(uname -m)/$(uname -r | cut -d_ -f1)/All"
            /usr/sbin/pkg_add sbcl
          run: |
            set -x
            export VER="${{ steps.ver.outputs.version }}"
            name="mlisp-${VER}"
            sbcl --non-interactive --load build.lisp
            sbcl --non-interactive --load build-admin.lisp
            sbcl --non-interactive --load build-bugs.lisp
            sbcl --non-interactive --load build-distrib.lisp
            sbcl --non-interactive --load build-procmail-gen.lisp
            work="$(mktemp -d)/work"
            mkdir -p "$work/bin" "$work/man/man1" "$work/man/man7"
            cp bin/* "$work/bin/"
            cp src/man/mlisp.1 src/man/mlisp-admin.1 src/man/mlisp-distrib.1 "$work/man/man1/"
            cp src/man/mlisp-intro.7 "$work/man/man7/"
            sed "s/@PKGVERSION@/${VER}/" etc/pkg/Makefile > "$work/Makefile"
            cp etc/pkg/PLIST etc/pkg/DESCR "$work/"
            pkg_create -c etc/pkg/DESCR -d etc/pkg/DESCR \
              -f etc/pkg/PLIST -I /usr/pkg -p "$work" \
              -U "${name}-netbsd-x86_64.tgz"

      - name: Upload netbsd artifact
        uses: actions/upload-artifact@v4
        with:
          name: netbsd-x86_64-pkgsrc
          path: "mlisp-*-netbsd-x86_64.tgz"

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          v="${{ steps.ver.outputs.version }}"
          gh release upload "${GITHUB_REF#refs/tags/}" "mlisp-${v}-netbsd-x86_64.tgz" --clobber

  freebsd-pkg:
    name: FreeBSD pkg
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: ver
        run: |
          ref="${GITHUB_REF#refs/tags/v}"
          if [ "$ref" = "$GITHUB_REF" ]; then ref="0.0.0-dev"; fi
          echo "version=$ref" >> "$GITHUB_OUTPUT"

      - name: Build in FreeBSD VM and pkg create
        uses: vmactions/freebsd-vm@v1
        with:
          envs: "VER"
          prepare: |
            pkg install -y sbcl
          run: |
            set -x
            export VER="${{ steps.ver.outputs.version }}"
            name="mlisp-${VER}"
            sbcl --non-interactive --load build.lisp
            sbcl --non-interactive --load build-admin.lisp
            sbcl --non-interactive --load build-bugs.lisp
            sbcl --non-interactive --load build-distrib.lisp
            sbcl --non-interactive --load build-procmail-gen.lisp

            root="$(mktemp -d)/root"
            mkdir -p "$root/usr/local/bin" "$root/usr/local/man/man1" "$root/usr/local/man/man7"
            cp bin/* "$root/usr/local/bin/"
            cp src/man/mlisp.1 src/man/mlisp-admin.1 src/man/mlisp-distrib.1 "$root/usr/local/man/man1/"
            cp src/man/mlisp-intro.7 "$root/usr/local/man/man7/"

            cat > +MANIFEST <<EOF
            name: mlisp
            version: "${VER}"
            origin: mail/mlisp
            comment: "Common Lisp mailing list manager and Debbugs-compatible bug tracker"
            desc: "$(cat etc/pkg/DESCR)"
            maintainer: denzuko@dapla.net
            www: https://github.com/denzuko/mlisp
            prefix: /usr/local
            licenselogic: single
            licenses: [BSD2CLAUSE]
            EOF

            pkg create -M +MANIFEST -r "$root" -o .
            mv mlisp-"${VER}".pkg "${name}-freebsd-x86_64.pkg" 2>/dev/null || \
              mv mlisp-"${VER}".txz "${name}-freebsd-x86_64.pkg"

      - name: Upload freebsd artifact
        uses: actions/upload-artifact@v4
        with:
          name: freebsd-x86_64-pkg
          path: "mlisp-*-freebsd-x86_64.pkg"

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          v="${{ steps.ver.outputs.version }}"
          gh release upload "${GITHUB_REF#refs/tags/}" "mlisp-${v}-freebsd-x86_64.pkg" --clobber
